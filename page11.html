<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>The Universe Chose You</title>

    <link rel="stylesheet" href="page11.css">
</head>
<body>

    <!-- VIDEO BACKGROUND -->

<div class="video-bg">

    <video autoplay muted loop playsinline>
        <source src="back.mp4" type="video/mp4">
    </video>

</div>

<!-- DARK OVERLAY -->
<div class="video-overlay"></div>

    <!-- STARS -->
    <div class="stars"></div>

    <!-- MAIN STORY -->
    <section class="story-container">

        <!-- SCENE 1 -->
        <div class="scene active" id="scene1">

            <div class="scene-bg universe-bg"></div>

            <div class="text-box">
                <p class="small-text">cosmic destiny ✦</p>

                <h1>
                    the universe<br>
                    chose you
                </h1>

                <p class="desc">
                    Somewhere between stars and silence,
                    your story quietly began.
                </p>
            </div>

        </div>


        <!-- SCENE 2 -->
        <div class="scene" id="scene2">

            <img src="earth.jpg" class="scene-image earth-image">

            <div class="overlay-center">
                out of billions of people...
            </div>

        </div>


        <!-- SCENE 3 -->
        <div class="scene" id="scene3">

            <img src="india.jpg" class="scene-image india-image">

            <div class="overlay-center">
                somewhere in india ✦
            </div>

        </div>


        <!-- SCENE 4 -->
        <div class="scene" id="scene4">

            <div class="room-bg"></div>

            <div class="overlay-center big">
                a beautiful soul arrives.
            </div>

        </div>


        <!-- SCENE 5 -->
        <div class="scene" id="scene5">

            <div class="photo-showcase">

                <img src="T1.jpeg" class="photo active">
                <img src="ti10.jpeg" class="photo">
                <img src="ti3.jpeg" class="photo">
                <img src="ti6.jpeg" class="photo">
                <img src="ti2.jpeg" class="photo">
                <img src="ti7.jpeg" class="photo">
                <img src="ti9.jpeg" class="photo">
                <img src="ti10.jpeg" class="photo">
                <img src="ti5.jpeg" class="photo">
                <img src="ti.jpeg" class="photo">

            </div>

            <div class="photo-text">
                and suddenly... the world became softer.
            </div>

        </div>

    </section>


    <!-- NEXT BUTTON -->
    <a href="page12.html" class="next-btn">
        continue the journey ✦
    </a>

     <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" class="music-btn">
    ♫ Play Music
</button>

    <script src="page11.js"></script>

</body>
</html>
