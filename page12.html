<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>The Universe Built Her Name</title>

    <link rel="stylesheet" href="page12.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- BACKGROUND VIDEO -->
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="12.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>


    <!-- STAR LAYERS -->
    <div class="stars stars-small"></div>
    <div class="stars stars-medium"></div>
    <div class="stars stars-big"></div>

    <!-- STAR CANVAS -->
    <canvas id="starCanvas"></canvas>

    <!-- INTRO TEXT -->
    <div class="intro-text" id="introText">
        <p>some souls are too rare...</p>
        <h1>the universe remembers them differently</h1>
    </div>

    <!-- NAME FORMATION -->
   <!-- NAME FORMATION -->
<div class="name-container" id="nameContainer">

    <span class="name-letter">S</span>
    <span class="name-letter">W</span>
    <span class="name-letter">A</span>
    <span class="name-letter">T</span>
    <span class="name-letter">I</span>

</div>

    <!-- PHOTO REVEAL -->
<div class="photo-section" id="photoSection">

    <div class="photo-glow"></div>

    <div class="photo-card">

        <img src="ti2.jpeg" class="main-photo">

    </div>

    <div class="final-text">

        <h2>
            even the stars couldn't stop spelling you
        </h2>

        <p class="final-line">
            because some names<br>
            were never meant<br>
            to be forgotten
        </p>

    </div>

</div>

    <!-- BUTTON -->
    <a href="page13.html" class="next-btn">
        continue the journey ✦
    </a>

    <!-- MUSIC -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

        ♫ play music
    </button>
