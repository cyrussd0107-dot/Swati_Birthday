<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>The Weight Of Time</title>

  <!-- FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >

  <!-- GSAP -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <link rel="stylesheet" href="page19.css">

</head>

<body>

  <!-- MUSIC -->

  <audio id="bgMusic" autoplay loop>

    <source src="inter.mp3" type="audio/mp3">

  </audio>

  <!-- EXPERIENCE -->

  <main class="experience">

    <!-- SPACE -->

    <div class="space"></div>

    <!-- NEBULA -->

    <div class="nebula nebula1"></div>
    <div class="nebula nebula2"></div>

    <!-- STARS -->

    <div class="stars stars-back"></div>
    <div class="stars stars-mid"></div>
    <div class="stars stars-front"></div>

    <!-- GRAIN -->

    <div class="grain"></div>

    <!-- VIGNETTE -->

    <div class="vignette"></div>

    <!-- CAMERA -->

    <div class="camera">

      <!-- THOUGHT -->

      <div class="thought"></div>

      <!-- STAR -->

      <div class="main-star"></div>

      <!-- STAR LIGHT -->

      <div class="star-light"></div>

      <!-- MEMORY -->

      <div class="memory-scene">

        <div class="memory-fog"></div>

        <img src="bg.jpeg" class="memory-image">

      </div>

      <!-- VIDEO -->

      <div class="video-scene">

        <video
          id="memoryVideo"
          muted
          playsinline
          preload="auto"
        >

          <source src="memory-montage.mp4" type="video/mp4">

        </video>

      </div>

      <!-- LETTER -->

      <div class="letter-scene">

        <div class="paper-overlay"></div>

        <div class="letter-text">

          and there was always something I wanted to tell you...

        </div>

      </div>

    </div>

  </main>

  <script src="page19.js"></script>

</body>

</html>
