<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>21 Years Of Swati ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="page18.css">

</head>

<body>

<!-- MUSIC -->

<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<button class="music-btn" id="musicBtn">
    ♫ play music
</button>

<!-- CINEMA BARS -->

<div class="cinema-top"></div>
<div class="cinema-bottom"></div>

<!-- INTRO VIDEO -->

<section class="intro-scene">

    <video class="intro-video" autoplay muted loop playsinline>
        <source src="back.mp4" type="video/mp4">
    </video>

    <div class="intro-overlay"></div>

    <div class="particles"></div>

    <!-- TEXTS -->

    <div class="text-container">

        <div class="text-wrapper">

            <div class="line" id="line1">
                not every person changes your life.
            </div>

            <div class="line" id="line2">
                most people just pass through it.
            </div>

            <div class="line special" id="line3">
                and somehow...<br>
                you became one of them.
            </div>

        </div>

    </div>

</section>

<!-- PHOTO SCENE -->

<section class="photo-scene" id="photoScene">

    <div class="photo-bg"></div>

    <div class="photo-glow"></div>

    <div class="photo-card" id="photoCard">

        <img src="ti2.jpeg">

    </div>

    <div class="photo-text" id="photoText">
        some souls don't just enter your life...
        <br>
        they become a part of it.
    </div>

</section>

<!-- FINAL VIDEO SCENE -->

<section class="final-scene" id="finalScene">

    <video class="final-video" autoplay muted loop playsinline>
        <source src="bgg.mp4" type="video/mp4">
    </video>

    <div class="final-overlay"></div>

    <div class="final-content">

        <div class="final-small">
            21 YEARS OF SWATUU
        </div>

        <div class="final-title">
            and somehow...
            <br>
            the world became softer.
        </div>

        <div class="final-text">
            maybe some people are simply born
            <br>
            to feel unforgettable.
        </div>

        <button class="next-btn" id="nextBtn">
            continue ✨
        </button>

    </div>

</section>

<script src="page18.js"></script>

</body>
</html>
